name: process-data
on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 1 * *"   # 20:30 UTC on the 1st of each month
    # 1 hour after setup-koordinates-exports job runs to allow export archives to process

permissions:
  actions: write          # For managing Actions cache
  contents: write         # For tagging and publishing releases
  pull-requests: write    # For auto-PRs that update street_postcodes/

jobs:
  process-data:
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./scripts/koordinates
        run: pip install -r requirements.txt

      - name: Create download data folder
        run: mkdir -p scripts/koordinates/data

      - name: Remove stale caches
        working-directory: ./scripts
        run: bash cache-purger.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore cached download
        id: cache-nz-koordinates
        uses: actions/cache/restore@v6
        with:
          path: |
            scripts/koordinates/data
          key: ${{ runner.os }}-nz-koordinates

      - name: Run export downloads script
        working-directory: ./scripts/koordinates
        run: python ./export_downloads.py
        env:
          LINZ_DATA_API_TOKEN: ${{ secrets.LINZ_DATA_API_TOKEN }}
          STATSNZ_DATA_API_TOKEN: ${{ secrets.STATSNZ_DATA_API_TOKEN }}

      - name: Save download cache
        id: cache-nz-koordinates-save
        uses: actions/cache/save@v6
        with:
          path: |
            scripts/koordinates/data
          key: ${{ steps.cache-nz-koordinates.outputs.cache-primary-key }}

      - name: Extract data
        run: bash scripts/extract-export-data.sh

      - name: Check data processing directory contents
        run: |
          echo "Contents of ./data:"
          ls -R ./data
          echo "pwd:"
          pwd

      - name: ⚙️ Install postgis
        run: |
          sudo apt-get update
          sudo apt-get -y install postgis

      - name: Smoke test
        env:
          PGHOST: localhost
          PGUSER: postgres
        run: bash tests/run.sh

      - name: Run processing
        run: bash scripts/run.sh
        env:
          PGHOST: localhost
          PGUSER: postgres

      - name: Generate artifact name
        id: generate-name
        run: echo "artifact=open_nz_postcode_boundaries_shp_`date +%Y-%m-%d`" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.generate-name.outputs.artifact }}
          path: release/open_nz_postcode_boundaries_shp.zip
          retention-days: 30

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PGHOST: localhost
          PGUSER: postgres
        run: |
          PRECISION=$(psql -At -d open_nz_postcodes -c "SELECT ROUND((SUM(count_matching_address_points)::numeric / NULLIF(SUM(count_matching_address_points) + SUM(count_non_matching_address_points), 0)) * 100, 2) FROM postcode_boundaries;")
          echo "Precision: ${PRECISION}%"
          if awk "BEGIN { exit !($PRECISION < 95) }"; then
            echo "::error::Precision ${PRECISION}% below 95% threshold; skipping release"
            exit 1
          fi
          TAG="v$(date -u +%Y.%m.%d)"
          NOTES="Precision: ${PRECISION}%. Generated by [process-data run ${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})."
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; replacing shapefile asset"
            gh release upload "$TAG" release/open_nz_postcode_boundaries_shp.zip --clobber
          else
            gh release create "$TAG" \
              release/open_nz_postcode_boundaries_shp.zip \
              --title "Open NZ Postcodes $TAG" \
              --notes "$NOTES"
          fi

      - name: Prune releases older than 36 months
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -u -d "36 months ago" +%Y-%m-%dT%H:%M:%SZ)
          gh release list --limit 200 --json tagName,publishedAt \
            | jq -r --arg cutoff "$CUTOFF" '.[] | select(.publishedAt < $cutoff) | .tagName' \
            | while read tag; do
                echo "Deleting $tag"
                gh release delete "$tag" --cleanup-tag --yes
              done

      - name: Auto-PR new LINZ roads
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PGHOST: localhost
          PGUSER: postgres
        run: |
          psql -d open_nz_postcodes -f scripts/add-new-roads.sql > /dev/null
          bash scripts/export-street-postcodes.sh
          if git diff --quiet -- street_postcodes/; then
            echo "No new roads to add"
            exit 0
          fi
          BRANCH="auto/new-roads-$(date -u +%Y-%m)-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              -c user.name='github-actions[bot]' \
              add street_postcodes/
          git -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              -c user.name='github-actions[bot]' \
              commit -m "Auto: add new LINZ roads $(date -u +%Y-%m)"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Auto: add new LINZ roads $(date -u +%Y-%m)" \
            --body "Generated by [process-data run ${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}).

          Review the heuristic locality / postcode assignments from \`scripts/add-new-roads.sql\` before merging."
